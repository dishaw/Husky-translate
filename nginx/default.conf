server {
    listen 80;
    server_name _;

    root /usr/share/nginx/html;
    index translator-portal.html;

    # 静态文件：极速秒开
    location / {
        try_files $uri $uri/ /translator-portal.html;
    }

    # SVG/图片等静态资源：强缓存
    location ~* \.(svg|png|jpg|jpeg|gif|ico|woff2?|css|js)$ {
        expires 7d;
        add_header Cache-Control "public, immutable";
    }

    # gzip 压缩（html/css/js/svg 都压）
    gzip on;
    gzip_types text/html text/css application/javascript image/svg+xml;
    gzip_min_length 256;
}
